<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1000" viewBox="0 0 1800 1000" role="img" aria-labelledby="title desc">
  <title id="title">LoGeR Pipeline v2 Clean Layout</title>
  <desc id="desc">A clean paper-style layout for LoGeR Pipeline v2 with three lanes: evidence on top, main reconstruction pipeline in the middle, and recurrent memory update at the bottom.</desc>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,6 L0,12 Z" fill="#1d2730"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,6 L0,12 Z" fill="#1469a8"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,6 L0,12 Z" fill="#b43b3b"/>
    </marker>
    <marker id="arrowGold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L11,6 L0,12 Z" fill="#92710f"/>
    </marker>

    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9e9f6"/>
      <stop offset="0.55" stop-color="#f9f5e9"/>
      <stop offset="1" stop-color="#d6c0aa"/>
    </linearGradient>
    <linearGradient id="heatGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#245083"/>
      <stop offset="0.45" stop-color="#f2e46d"/>
      <stop offset="1" stop-color="#bd3636"/>
    </linearGradient>
    <linearGradient id="semGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67c79b"/>
      <stop offset="0.52" stop-color="#f4cf61"/>
      <stop offset="1" stop-color="#e8727d"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#edf7fb"/>
      <stop offset="1" stop-color="#c7dde7"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#17202a" flood-opacity="0.14"/>
    </filter>

    <style>
      .page { fill: #fbfaf6; }
      .lane { fill: #ffffff; stroke: #ded8ce; stroke-width: 1.3; opacity: 0.92; }
      .laneLabel { font: 700 14px Arial, Helvetica, sans-serif; fill: #6a747c; letter-spacing: 0.5px; }
      .block { stroke: #1d2730; stroke-width: 2.2; filter: url(#shadow); }
      .input { fill: #ffffff; }
      .probe { fill: #e7ecef; }
      .ctrl { fill: #f6edcf; }
      .backbone { fill: #dcecf8; }
      .output { fill: #e9e3f6; }
      .cue { fill: #edf6e4; }
      .sem { fill: #f7e2d8; }
      .write { fill: #f5dddd; }
      .memory { fill: url(#memGrad); }
      .dash { stroke-dasharray: 8 7; }
      .arrow { fill: none; stroke: #1d2730; stroke-width: 3.0; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #1d2730; stroke-width: 2.2; marker-end: url(#arrow); }
      .blue { fill: none; stroke: #1469a8; stroke-width: 3.0; marker-end: url(#arrowBlue); }
      .blueThin { fill: none; stroke: #1469a8; stroke-width: 2.3; marker-end: url(#arrowBlue); }
      .red { fill: none; stroke: #b43b3b; stroke-width: 3.0; marker-end: url(#arrowRed); }
      .redThin { fill: none; stroke: #b43b3b; stroke-width: 2.3; marker-end: url(#arrowRed); }
      .gold { fill: none; stroke: #92710f; stroke-width: 3.0; marker-end: url(#arrowGold); }
      .goldThin { fill: none; stroke: #92710f; stroke-width: 2.3; marker-end: url(#arrowGold); }
      .goldDash { fill: none; stroke: #92710f; stroke-width: 2.4; stroke-dasharray: 8 8; marker-end: url(#arrowGold); }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111820; letter-spacing: 0; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #53616a; letter-spacing: 0; }
      .head { font: 700 22px Arial, Helvetica, sans-serif; fill: #111820; letter-spacing: 0; }
      .body { font: 400 16px Arial, Helvetica, sans-serif; fill: #263238; letter-spacing: 0; }
      .tiny { font: 400 13px Arial, Helvetica, sans-serif; fill: #52616a; letter-spacing: 0; }
      .mono { font: 700 14px Arial, Helvetica, sans-serif; fill: #263238; letter-spacing: 0; }
      .tag { fill: #1d2730; }
      .tagText { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.5px; }
      .legend { font: 400 13px Arial, Helvetica, sans-serif; fill: #3f4b54; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="page" width="1800" height="1000"/>
  <text class="title" x="900" y="52" text-anchor="middle">LoGeR Hybrid Memory Pipeline v2</text>
  <text class="subtitle" x="900" y="82" text-anchor="middle">clean three-lane view: evidence, reconstruction, memory</text>

  <!-- lane backgrounds -->
  <rect class="lane" x="72" y="122" width="1656" height="210" rx="22"/>
  <text class="laneLabel" x="100" y="151">EVIDENCE LANE</text>
  <rect class="lane" x="72" y="360" width="1656" height="250" rx="22"/>
  <text class="laneLabel" x="100" y="389">MAIN RECONSTRUCTION LANE</text>
  <rect class="lane" x="72" y="642" width="1656" height="236" rx="22"/>
  <text class="laneLabel" x="100" y="671">RECURRENT MEMORY LANE</text>

  <!-- main lane blocks -->
  <g transform="translate(108, 432)">
    <rect class="block input" x="0" y="0" width="205" height="118" rx="16"/>
    <g transform="translate(39, 24)">
      <rect x="0" y="22" width="72" height="48" rx="5" fill="url(#frameGrad)" stroke="#1d2730" stroke-width="1.2"/>
      <path d="M5 64 L25 42 L40 56 L60 34 L68 64 Z" fill="#70a980" opacity="0.82"/>
      <circle cx="56" cy="34" r="6" fill="#e9ca61"/>
      <rect x="28" y="10" width="72" height="48" rx="5" fill="url(#frameGrad)" stroke="#1d2730" stroke-width="1.2"/>
      <path d="M33 52 L53 30 L70 45 L91 25 L96 52 Z" fill="#70a980" opacity="0.82"/>
      <circle cx="86" cy="23" r="6" fill="#e9ca61"/>
      <rect x="56" y="0" width="72" height="48" rx="5" fill="url(#frameGrad)" stroke="#1d2730" stroke-width="1.2"/>
      <path d="M61 42 L82 20 L98 35 L118 15 L124 42 Z" fill="#70a980" opacity="0.82"/>
      <circle cx="114" cy="14" r="6" fill="#e9ca61"/>
    </g>
    <text class="head" x="102" y="92" text-anchor="middle">Chunk</text>
    <text class="tiny" x="102" y="111" text-anchor="middle">K frames + overlap</text>
  </g>

  <g transform="translate(390, 418)">
    <rect class="block probe" x="0" y="0" width="245" height="146" rx="17"/>
    <rect class="tag" x="22" y="18" width="58" height="23" rx="7"/>
    <text class="tagText" x="51" y="34" text-anchor="middle">PASS 1</text>
    <text class="head" x="133" y="58" text-anchor="middle">Probe LoGeR</text>
    <g transform="translate(52, 78)">
      <rect x="0" y="0" width="132" height="13" rx="5" fill="#cfd8de" stroke="#1d2730"/>
      <rect x="9" y="19" width="132" height="13" rx="5" fill="#dce3e8" stroke="#1d2730"/>
      <rect x="18" y="38" width="132" height="13" rx="5" fill="#e7ecef" stroke="#1d2730"/>
    </g>
    <text class="tiny" x="122" y="135" text-anchor="middle">geometry + Q/K + replay cache</text>
  </g>

  <g transform="translate(765, 414)">
    <rect class="block ctrl" x="0" y="0" width="270" height="154" rx="18"/>
    <text class="head" x="135" y="43" text-anchor="middle">HMC</text>
    <text class="body" x="135" y="72" text-anchor="middle">control prior</text>
    <g transform="translate(38, 96)">
      <rect x="0" y="0" width="80" height="30" rx="8" fill="#ffffff" stroke="#1469a8" stroke-width="1.5"/>
      <text class="mono" x="40" y="20" text-anchor="middle" fill="#1469a8">B_read</text>
      <rect x="112" y="0" width="80" height="30" rx="8" fill="#ffffff" stroke="#b43b3b" stroke-width="1.5"/>
      <text class="mono" x="152" y="20" text-anchor="middle" fill="#b43b3b">A_write</text>
    </g>
  </g>

  <g transform="translate(1160, 418)">
    <rect class="block backbone" x="0" y="0" width="270" height="146" rx="17"/>
    <rect class="tag" x="22" y="18" width="58" height="23" rx="7"/>
    <text class="tagText" x="51" y="34" text-anchor="middle">PASS 2</text>
    <text class="head" x="148" y="58" text-anchor="middle">Controlled LoGeR</text>
    <g transform="translate(59, 78)">
      <rect x="0" y="0" width="132" height="13" rx="5" fill="#bfdaf0" stroke="#1d2730"/>
      <rect x="9" y="19" width="132" height="13" rx="5" fill="#d0e5f4" stroke="#1d2730"/>
      <rect x="18" y="38" width="132" height="13" rx="5" fill="#e4f1fa" stroke="#1d2730"/>
      <path d="M150 -3 L170 7 L150 17 Z" fill="#1469a8"/>
      <path d="M159 16 L179 26 L159 36 Z" fill="#1469a8" opacity="0.75"/>
    </g>
    <text class="tiny" x="135" y="135" text-anchor="middle">read-path attention intervention</text>
  </g>

  <g transform="translate(1510, 428)">
    <rect class="block output" x="0" y="0" width="175" height="126" rx="16"/>
    <text class="head" x="88" y="38" text-anchor="middle">3D output</text>
    <path d="M35 82 C62 52, 96 47, 139 28" fill="none" stroke="#6751b8" stroke-width="4"/>
    <circle cx="35" cy="82" r="5" fill="#6751b8"/>
    <circle cx="76" cy="54" r="5" fill="#6751b8"/>
    <circle cx="139" cy="28" r="5" fill="#6751b8"/>
    <g fill="#64748b" opacity="0.9">
      <circle cx="50" cy="31" r="2.5"/><circle cx="76" cy="84" r="2.5"/><circle cx="112" cy="71" r="2.5"/>
      <circle cx="141" cy="88" r="2.5"/><circle cx="151" cy="61" r="2.5"/>
    </g>
    <text class="tiny" x="88" y="110" text-anchor="middle">poses + points</text>
  </g>

  <!-- evidence lane blocks -->
  <g transform="translate(492, 175)">
    <rect class="block cue" x="0" y="0" width="245" height="112" rx="16"/>
    <text class="head" x="122" y="37" text-anchor="middle">Internal cue</text>
    <text class="tiny" x="122" y="58" text-anchor="middle">C23-past Q/Q similarity</text>
    <rect x="42" y="76" width="160" height="18" rx="5" fill="url(#heatGrad)" stroke="#1d2730"/>
  </g>

  <g transform="translate(808, 175)">
    <rect class="block sem" x="0" y="0" width="245" height="112" rx="16"/>
    <text class="head" x="122" y="37" text-anchor="middle">Semantic cue</text>
    <text class="tiny" x="122" y="58" text-anchor="middle">optional masklet prior</text>
    <rect x="59" y="74" width="126" height="22" rx="7" fill="url(#semGrad)" stroke="#1d2730"/>
    <circle cx="91" cy="85" r="8" fill="#ffffff" opacity="0.62"/>
    <rect x="115" y="79" width="28" height="12" rx="4" fill="#ffffff" opacity="0.58"/>
  </g>

  <g transform="translate(1124, 175)">
    <rect class="block input" x="0" y="0" width="245" height="112" rx="16"/>
    <text class="head" x="122" y="37" text-anchor="middle">Write evidence</text>
    <text class="tiny" x="122" y="58" text-anchor="middle">stage_d x D_g^{-1/2}</text>
    <text class="tiny" x="122" y="82" text-anchor="middle">TTGR / self-cue modifies risk</text>
  </g>

  <!-- memory lane blocks -->
  <g transform="translate(140, 704)">
    <path class="block memory" d="M18 14 C18 0, 202 0, 202 14 L202 118 C202 132, 18 132, 18 118 Z"/>
    <ellipse cx="110" cy="14" rx="92" ry="14" fill="#edf7fb" stroke="#1d2730" stroke-width="2.2"/>
    <text class="head" x="110" y="58" text-anchor="middle">H_m</text>
    <text class="tiny" x="110" y="86" text-anchor="middle">previous hybrid memory</text>
    <text class="tiny" x="110" y="108" text-anchor="middle">TTT + SWA + ref</text>
  </g>

  <g transform="translate(610, 698)">
    <rect class="block write" x="0" y="0" width="270" height="144" rx="18"/>
    <text class="head" x="135" y="42" text-anchor="middle">TTT write</text>
    <text class="body" x="135" y="72" text-anchor="middle">probe replay cache</text>
    <text class="tiny" x="135" y="100" text-anchor="middle">updates w0 / w1 / w2</text>
    <text class="tiny" x="135" y="122" text-anchor="middle">diagnostic freeze can cut here</text>
  </g>

  <g transform="translate(1020, 698)">
    <rect class="block memory" x="0" y="0" width="250" height="144" rx="18"/>
    <text class="head" x="125" y="42" text-anchor="middle">SWA / ref</text>
    <text class="body" x="125" y="72" text-anchor="middle">local memory</text>
    <text class="tiny" x="125" y="100" text-anchor="middle">both-overlap keep scope</text>
    <text class="tiny" x="125" y="122" text-anchor="middle">source KV replace</text>
  </g>

  <g transform="translate(1450, 704)">
    <path class="block memory" d="M18 14 C18 0, 202 0, 202 14 L202 118 C202 132, 18 132, 18 118 Z"/>
    <ellipse cx="110" cy="14" rx="92" ry="14" fill="#edf7fb" stroke="#1d2730" stroke-width="2.2"/>
    <text class="head" x="110" y="58" text-anchor="middle">H_{m+1}</text>
    <text class="tiny" x="110" y="86" text-anchor="middle">next chunk memory</text>
  </g>

  <!-- arrows main lane -->
  <path class="arrow" d="M313 491 L390 491"/>
  <path class="arrow" d="M635 491 L765 491"/>
  <path class="blue" d="M1035 491 L1160 491"/>
  <path class="arrow" d="M1430 491 L1510 491"/>

  <!-- evidence arrows -->
  <path class="thin" d="M512 418 L590 287"/>
  <path class="blueThin" d="M614 287 L836 414"/>
  <path class="blueThin" d="M930 287 L900 414"/>
  <path class="redThin" d="M1246 287 L880 698"/>

  <!-- memory arrows clean orthogonal -->
  <path class="gold" d="M250 704 L250 612 L430 612 L430 564"/>
  <path class="goldThin" d="M250 704 L250 654 L765 654 L765 530"/>
  <path class="red" d="M520 564 L520 770 L610 770"/>
  <path class="red" d="M900 568 L900 770 L880 770"/>
  <path class="arrow" d="M880 770 L1020 770"/>
  <path class="arrow" d="M1270 770 L1450 770"/>
  <path class="goldDash" d="M1560 836 L1560 914 L250 914 L250 836"/>

  <!-- small freeze diagnostic switch -->
  <g transform="translate(902, 726)">
    <rect x="0" y="0" width="76" height="46" rx="12" fill="#ffffff" stroke="#b43b3b" stroke-width="2" stroke-dasharray="7 6"/>
    <text class="mono" x="38" y="20" text-anchor="middle" fill="#b43b3b">freeze</text>
    <text class="tiny" x="38" y="38" text-anchor="middle">lesion</text>
  </g>

  <!-- notes -->
  <g transform="translate(118, 906)">
    <rect x="0" y="0" width="620" height="48" rx="12" fill="#ffffff" stroke="#ded8ce"/>
    <text class="body" x="24" y="29">Main path stays horizontal; evidence only drops into HMC; memory only lives in the bottom lane.</text>
  </g>
  <g transform="translate(795, 906)">
    <rect x="0" y="0" width="500" height="48" rx="12" fill="#ffffff" stroke="#e0c4c4"/>
    <text class="body" x="24" y="29">v7 best: chunk5 / w0 / all-layer / low-prior TTGR gamma=0.025.</text>
  </g>

  <!-- legend -->
  <g transform="translate(1390, 906)">
    <line x1="0" y1="0" x2="42" y2="0" class="arrow"/>
    <text class="legend" x="54" y="5">data</text>
    <line x1="0" y1="24" x2="42" y2="24" class="blue"/>
    <text class="legend" x="54" y="29">control</text>
    <line x1="128" y1="0" x2="170" y2="0" class="red"/>
    <text class="legend" x="182" y="5">write</text>
    <line x1="128" y1="24" x2="170" y2="24" class="gold"/>
    <text class="legend" x="182" y="29">memory</text>
  </g>
</svg>
